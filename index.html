<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>I'm Sorry ❤️</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>I'm Really Sorry 💔</h1>
  <p class="message">Meri jaan... please mujhe maaf kar do 🥺</p>

  <div id="sorryBox"></div>

  <div class="couple">
    <img src="https://i.imgur.com/6Z8FQ6X.png" alt="couple">
  </div>

  <button onclick="showLove()">Click Me ❤️</button>

  <p id="loveMsg"></p>
</div>

<script>
  let box = document.getElementById("sorryBox");

  // 100 times sorry generate
  for(let i = 0; i < 100; i++){
    let span = document.createElement("span");
    span.innerText = "Sorry 💖 ";
    box.appendChild(span);
  }

  function showLove(){
    document.getElementById("loveMsg").innerText =
    "Tum meri life ho ❤️ Please wapas aa jao 😔";
  }
</script>

</body>
</html>
